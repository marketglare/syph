<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Syph</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#061318">
<style>
html,body{height:100%;margin:0;background:#061318;color:#e6f6ff;font-family:system-ui,Segoe UI,Roboto,Arial}
#app{height:100%;display:flex;flex-direction:column}
#view{flex:1;position:relative;overflow:hidden}
canvas{display:block}
.hud{position:absolute;right:12px;bottom:12px;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);padding:10px;border-radius:8px;display:flex;flex-direction:column;gap:8px;min-width:220px}
.controls{display:flex;flex-direction:column;gap:8px}
.hud button{padding:8px 12px;border-radius:6px;border:0;background:#ff6b6b;color:#111;font-weight:600;cursor:pointer}
.hud button.muted{background:#444;color:#ddd;cursor:default}
.stat{font-size:14px}
.banner{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(10,10,10,0.9);padding:18px;border-radius:10px;display:none;max-width:90%;white-space:pre-wrap}
.banner.show{display:block}
.modal-backdrop{position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:9999}
.modal{background:#071216;color:#e6f6ff;padding:18px;border-radius:10px;max-width:640px;max-height:80%;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,0.7)}
.modal h2{margin-top:0}
.modal .close{margin-top:12px;padding:8px 12px;background:#ff6b6b;border:0;border-radius:6px;cursor:pointer}
.lang-grid{display:flex;flex-wrap:wrap;gap:8px}
.lang-grid button{flex:1 0 45%;padding:8px;border-radius:6px;background:#3a7;color:#071216;font-weight:700;cursor:pointer;border:0}
.hud .small-actions{display:flex;flex-direction:column;gap:6px}
</style>
</head>
<body>
<div id="app">
  <div id="view"></div>
  <div class="hud" id="hud">
    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="killBtn" class="muted">Kill (2)</button>
    </div>
    <div class="stat" id="spCount">T. pallidum: 0</div>
    <div class="stat" id="killedCount">Total killed: 0</div>
    <div class="stat" id="recordMaxPop">Peak population: 0</div>
    <div class="stat" id="timeStat">Time: 00:00:00</div>
    <div class="stat" id="recovery">Recover in: —</div>
    <div class="small-actions">
      <button id="rulesBtn">Rules</button>
      <button id="languagesBtn">Languages</button>
      <button id="donatesBtn">Donates</button>
    </div>
  </div>
  <div class="banner" id="banner"></div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalContent">
    <div id="modalInner"></div>
    <button class="close" id="modalClose">Close</button>

</div>

/* Active locale state */
let ACTIVE_LOCALE = 'en';
function L(key, ...args){
 const loc = LOCALES[ACTIVE_LOCALE] || LOCALES['en'];
 const val = loc[key];
 if(typeof val === 'function') return val(...args);
 return val;
}
function refreshUIText(){
 document.getElementById('startBtn').textContent = L('start');
 document.getElementById('rulesBtn').textContent = L('rulesBtn');
 document.getElementById('languagesBtn').textContent = L('languagesBtn');

}
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let updateHUD = function(){};

/* Modal helpers */

const modalClose = document.getElementById('modalClose');

modalClose.addEventListener('click', closeModal);

/* CONFIG */
const CONFIG = {
 gameday_s: 60,
 division_period_real_s: 30,
 divisionAnim_s: 1.2,
 startCount: 1,
 startCountMin: 3,           // Новая переменная: минимум
 startCountMax: 5,
 maxSpirals: 1500,
 killMaxCharges: 2,
 killCooldownBetweenUses_s: 30,
 sleepProbabilityOnKill: 0.3,
 sleepDurationRange_s: [60,180],
 lodThreshold: 150,
 maxDetailedTubularSegments: 200,
 minRenderIntervalMs: 1000/30,
 highPerfRenderIntervalMs: 1000/60,
 dynamicRenderScale: 0.75,
 lowRenderScale: 0.5,
 perfSamplingMs: 2000,
 autoThrottleFPSDropThreshold: 40,
 instancedBatchSize: 500
};
let highPerfMode = false;

/* THREE setup */
const container = document.getElementById('view');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 2000);
camera.position.set(0, 0, 160);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});

/* Responsive helpers */
function computeViewWorldBounds(){
 const aspect = container.clientWidth / Math.max(1, container.clientHeight);
 const fov = camera.fov * (Math.PI/180);
 const height = 2 * Math.tan(fov/2) * Math.abs(camera.position.z);
 const width = height * aspect;
 return { ww: width*0.5, wh: height*0.5, wd: Math.abs(camera.position.z) };
}
function applyRenderSize(scale=1){
 const DPR = Math.min(window.devicePixelRatio || 1, 2);
 const w = Math.max(1, Math.floor(container.clientWidth * scale));
 const h = Math.max(1, Math.floor(container.clientHeight * scale));
 renderer.setPixelRatio(DPR);
 renderer.setSize(w, h, false);
 renderer.domElement.style.width = container.clientWidth + 'px';
 renderer.domElement.style.height = container.clientHeight + 'px';
 camera.aspect = container.clientWidth / Math.max(1, container.clientHeight);
 camera.updateProjectionMatrix();
 const minDim = Math.min(container.clientWidth, container.clientHeight);
 if(minDim < 420){
   camera.position.z = 120 + (420 - minDim) * 0.1;
 } else {
   camera.position.z = 160;
 }
}
let currentRenderScale = CONFIG.dynamicRenderScale;
renderer.setClearColor(0x061318);
applyRenderSize(currentRenderScale);
container.appendChild(renderer.domElement);
scene.add(new THREE.DirectionalLight(0xffffff, 0.9));
scene.add(new THREE.AmbientLight(0x404050, 0.9));

const rand = (a,b)=> a + Math.random()*(b-a);
const clamp = (v,a,b)=> Math.max(a, Math.min(b, v));
const Shared = { spiralGeom:null, spiralMat:null, lodGeom:null, lodMat:null, sleepingGeom:null, sleepingMat:null, instancedLOD:null, instancedCount:0 };

function createSpiralGeometry(turns=8, length=40, tubeRadius=0.9, radialSegments=6, tubularSegments=CONFIG.maxDetailedTubularSegments, scaleFactor=1/3){
 const pts = new Array(tubularSegments+1);
 for(let i=0;i<=tubularSegments;i++){
   const t = i / tubularSegments;
   const angle = t * Math.PI * 2 * turns;
   const z = (t - 0.5) * length;
   const r = 4.0 * (1 - 0.05 * t);
   pts[i] = new THREE.Vector3(Math.cos(angle)*r, Math.sin(angle)*r, z);
 }
 const path = new THREE.CatmullRomCurve3(pts);
 const geom = new THREE.TubeGeometry(path, tubularSegments, tubeRadius, radialSegments, false);
 geom.scale(scaleFactor, scaleFactor, scaleFactor);
 return geom;
}
function ensureSharedResources(){
 if(!Shared.spiralGeom) Shared.spiralGeom = createSpiralGeometry();
 if(!Shared.spiralMat) Shared.spiralMat = new THREE.MeshStandardMaterial({color:0xdfeefe, metalness:0.02, roughness:0.7});
 if(!Shared.lodGeom) Shared.lodGeom = new THREE.SphereGeometry(0.35,6,6);
 if(!Shared.lodMat) Shared.lodMat = new THREE.MeshBasicMaterial({color:0xdfeefe});
 if(!Shared.sleepingGeom) Shared.sleepingGeom = new THREE.SphereGeometry(0.5,8,8);
 if(!Shared.sleepingMat) Shared.sleepingMat = new THREE.MeshStandardMaterial({color:0x8fbfb0, transparent:true, opacity:0.55});
}

/* Spiral class */
class Spiral {
 constructor(id, seededPos=null){
   this.id = id;
   this.state = 'active';
   this.pos = seededPos ? seededPos.clone() : this._randomStartPos();
   this.target = this._randTarget();
   this.baseSpeed = rand(4.0,6.0);
   this.birth = performance.now();
   this.nextDivision = performance.now() + CONFIG.division_period_real_s*1000;
   this.mesh = null;
   this.sleepUntil = null;
   this.isAnimatingDivision = false;
   this.noiseOffset = Math.random()*1000;
   this._dead = false;
   this._tmpVec = new THREE.Vector3();
   this._toTarget = new THREE.Vector3();
   this._lastLittleUpdate = 0;
   this.createMesh();
 }
 _randomStartPos(){
   const vb = computeViewWorldBounds();
   return new THREE.Vector3(rand(-vb.ww, vb.ww), rand(-vb.wh, vb.wh), rand(-8,8));
 }
 _randTarget(){ const vb = computeViewWorldBounds(); return new THREE.Vector3(rand(-vb.ww*1.2, vb.ww*1.2), rand(-vb.wh*1.2, vb.wh*1.2), rand(-vb.wd*0.3, vb.wd*0.3)); }
 createMesh(){ ensureSharedResources(); const mesh = new THREE.Mesh(Shared.spiralGeom, Shared.spiralMat); mesh.position.copy(this.pos); mesh.rotation.set(rand(-0.2,0.2), rand(-0.2,0.2), rand(-3.14,3.14)); this.mesh = mesh; scene.add(mesh); }
 toPointLOD(){ if(this.mesh){ scene.remove(this.mesh); this.mesh = null; } ensureSharedResources(); const m = new THREE.Mesh(Shared.lodGeom, Shared.lodMat); m.position.copy(this.pos); this.mesh = m; scene.add(m); }
 restoreSpiralMesh(){ if(this.mesh){ scene.remove(this.mesh); this.mesh = null; } this.createMesh(); }
 update(dt, time, noise){
   if(this._dead) return;
   this._lastLittleUpdate += dt;
   if(this.state === 'sleeping'){
     if(time >= this.sleepUntil){ this.wake(); return; }
     if(this._lastLittleUpdate > 50){
       const flowX = noise.noise((time+this.noiseOffset)/8000)-0.5;
       const flowY = noise.noise((time+this.noiseOffset+2000)/8000)-0.5;
       this._tmpVec.set(flowX, flowY, 0).multiplyScalar(0.01*dt);
       this.pos.add(this._tmpVec);
       this._lastLittleUpdate = 0;
     }
     if(this.mesh){ this.mesh.position.copy(this.pos); this.mesh.scale.setScalar(0.45); this.mesh.rotation.z += 0.0008 * dt; }
     return;
   }
   const toTarget = this._toTarget;
   toTarget.subVectors(this.target, this.pos);
   const dist = toTarget.length();
   if(dist < 1.0) this.target = this._randTarget();
   toTarget.normalize();
   if(this._lastLittleUpdate > 30){
     const flowX = noise.noise((time+this.noiseOffset)/4000)-0.5;
     const flowY = noise.noise((time+this.noiseOffset+1200)/4000)-0.5;
     const flowZ = noise.noise((time+this.noiseOffset+2400)/4000)-0.5;
     const flow = this._tmpVec.set(flowX, flowY, flowZ).multiplyScalar(0.25);
     const move = toTarget.multiplyScalar(this.baseSpeed * dt/1000);
     move.add(flow.multiplyScalar(dt/1000*20));
     this.pos.add(move);
     const vb = computeViewWorldBounds();
     const bx = Math.max(40, vb.ww*1.1), by = Math.max(30, vb.wh*1.1), bz = Math.max(10, vb.wd*0.5);
     if(this.pos.x > bx) this.pos.x = bx - (this.pos.x - bx);
     if(this.pos.x < -bx) this.pos.x = -bx - (this.pos.x + bx);
     if(this.pos.y > by) this.pos.y = by - (this.pos.y - by);
     if(this.pos.y < -by) this.pos.y = -by - (this.pos.y + by);
     if(this.pos.z > bz) this.pos.z = bz - (this.pos.z - bz);
     if(this.pos.z < -bz) this.pos.z = -bz - (this.pos.z + bz);
     this._lastLittleUpdate = 0;
   }
   if(this.mesh){ this.mesh.position.copy(this.pos); this.mesh.rotation.z += 0.0006 * dt * (this.id % 2 ? 1 : -1); }
   if(!this.isAnimatingDivision && performance.now() >= this.nextDivision) this.startDivision();
 }
 startDivision(){ if(this._dead || this.state==='sleeping') return; this.isAnimatingDivision = true; this._divisionAnimEnd = performance.now() + CONFIG.divisionAnim_s*1000; this._originalScale = this.mesh ? this.mesh.scale.clone() : new THREE.Vector3(1,1,1); }
 progressDivision(now){ if(!this.isAnimatingDivision) return; const t = 1 - Math.max(0, (this._divisionAnimEnd - now) / (CONFIG.divisionAnim_s*1000)); if(t < 1){ const s = 1 - 0.45 * Math.sin(Math.min(1,t)*Math.PI); if(this.mesh) this.mesh.scale.set(1.0, s, s*0.9); } else { if(this.mesh && this._originalScale) this.mesh.scale.copy(this._originalScale); this.finishDivision(); this.isAnimatingDivision = false; this._divisionAnimEnd = null; this._originalScale = null; } }
 finishDivision(){ this.nextDivision = performance.now() + CONFIG.division_period_real_s*1000; const childPos = this.pos.clone().add(new THREE.Vector3(rand(-2,2), rand(-1.5,1.5), rand(-0.8,0.8))); const child = new Spiral(Spiral.nextId++, childPos); child.nextDivision = performance.now() + CONFIG.division_period_real_s*1000 + rand(500,5000); addSpiral(child); }
 killAttempt(p_hit, rng){ if(this.state === 'sleeping') return 'immune'; const r = rng(); if(r < p_hit){ this.dispose(); return 'dead'; } if(rng() < CONFIG.sleepProbabilityOnKill){ this.goToSleep(); return 'slept'; } return 'survived'; }
 goToSleep(){ this.state = 'sleeping'; this.sleepUntil = performance.now() + rand(CONFIG.sleepDurationRange_s[0]*1000, CONFIG.sleepDurationRange_s[1]*1000); if(this.mesh){ scene.remove(this.mesh); this.mesh = null; } ensureSharedResources(); const m = new THREE.Mesh(Shared.sleepingGeom, Shared.sleepingMat); m.position.copy(this.pos); this.mesh = m; scene.add(this.mesh); }
 wake(){ this.state = 'active'; this.sleepUntil = null; this.nextDivision = performance.now() + rand(2000, CONFIG.division_period_real_s*1000); if(this.mesh){ scene.remove(this.mesh); this.mesh = null; } this.createMesh(); if(this.mesh) this.mesh.scale.set(1,1,1); }
 dispose(){ if(this.mesh){ scene.remove(this.mesh); this.mesh = null; } this._dead = true; }
}
Spiral.nextId = 1;

const spirals = [];
let totalKilled = 0;
let recordMaxPop = parseInt(localStorage.getItem('tp_record_maxpop')||'0',10) || 0;
function addSpiral(s){ spirals.push(s); updateHUD(); checkAndUpdateMaxPop(); }
function removeDead(){ let write=0; for(let read=0; read<spirals.length; read++){ if(!spirals[read]._dead) spirals[write++]=spirals[read]; } if(write!==spirals.length) spirals.length = write; updateHUD(); }
function checkAndUpdateMaxPop(){ if(spirals.length > recordMaxPop){ recordMaxPop = spirals.length; localStorage.setItem('tp_record_maxpop', String(recordMaxPop)); document.getElementById('recordMaxPop').textContent = LOCALES[ACTIVE_LOCALE].recordMaxPop ? LOCALES[ACTIVE_LOCALE].recordMaxPop(recordMaxPop) : `Peak population: ${recordMaxPop}`; } }

class SimpleNoise { constructor(seed=1){ this.seed = seed; } rand(x){ return fract(Math.sin(x*127.1 + this.seed*311.7)*43758.5453); } smooth(x){ return this.rand(x)*0.5 + this.rand(x+1)*0.5; } noise(x){ return this.smooth(x); } }
function fract(v){ return v - Math.floor(v); }
const noise = new SimpleNoise(Math.random()*1000);

let running = false;
let last = performance.now();
let lodMode = false;
let charges = CONFIG.killMaxCharges;
let nextChargeReadyAt = null;

const killBtn = document.getElementById('killBtn');
const startBtn = document.getElementById('startBtn');
const spCountEl = document.getElementById('spCount');
const killedCountEl = document.getElementById('killedCount');
const recordMaxPopEl = document.getElementById('recordMaxPop');
const recoveryEl = document.getElementById('recovery');
const timeStatEl = document.getElementById('timeStat');

function formatTimeHHMMSS(secTotal){ const s = Math.floor(secTotal%60); const m = Math.floor((secTotal/60)%60); const h = Math.floor(secTotal/3600); return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'); }
let gameStartAt = null;

updateHUD = function(){
 spCountEl.textContent = (LOCALES[ACTIVE_LOCALE].spCount || LOCALES['en'].spCount)(spirals.length);
 killedCountEl.textContent = (LOCALES[ACTIVE_LOCALE].killedCount || LOCALES['en'].killedCount)(totalKilled);
 recordMaxPopEl.textContent = (LOCALES[ACTIVE_LOCALE].recordMaxPop || LOCALES['en'].recordMaxPop)(recordMaxPop);
 killBtn.textContent = (LOCALES[ACTIVE_LOCALE].kill || LOCALES['en'].kill)(charges);
 if(charges > 0) killBtn.classList.remove('muted'); else killBtn.classList.add('muted');
 if(running && gameStartAt){ const elapsed = (performance.now() - gameStartAt)/1000; timeStatEl.textContent = (LOCALES[ACTIVE_LOCALE].timeStat || LOCALES['en'].timeStat)(formatTimeHHMMSS(elapsed)); }
};

function spawnInitial(count){
 const vb = computeViewWorldBounds();
 for(let i=0;i<count;i++){
   const x = rand(-vb.ww*0.8, vb.ww*0.8);
   const y = rand(-vb.wh*0.8, vb.wh*0.8);
   const z = rand(-vb.wd*0.15, vb.wd*0.15);
   addSpiral(new Spiral(Spiral.nextId++, new THREE.Vector3(x,y,z)));
 }
}

function resetGameStateBeforeStart(){
 for(const s of spirals) s.dispose();
 spirals.length = 0;
 Spiral.nextId = 1;
 totalKilled = 0;
 charges = CONFIG.killMaxCharges;
 nextChargeReadyAt = null;
 recordMaxPop = 0;
 localStorage.setItem('tp_record_maxpop', String(recordMaxPop));
 document.getElementById('banner').classList.remove('show');
 updateHUD();
 if(Shared.instancedLOD){ scene.remove(Shared.instancedLOD); Shared.instancedLOD.geometry.dispose(); Shared.instancedLOD.material.dispose(); Shared.instancedLOD = null; Shared.instancedCount = 0; }
}
function startGame(){resetGameStateBeforeStart();const randomStartCount = Math.floor(Math.random() * (CONFIG.startCountMax - CONFIG.startCountMin + 1)) + CONFIG.startCountMin;spawnInitial(randomStartCount);running = true;last = performance.now();gameStartAt = performance.now();updateHUD();}
function gameOver(victory=false){ running = false; const msg = victory ? 'Victory over T. Pallidum' : 'Defeat — overflow!'; const banner = document.getElementById('banner'); banner.textContent = msg; banner.classList.add('show'); }
function rng(){ return Math.random(); }
function compute_p_hit(sp){ return clamp(0.8 + (Math.random()-0.5)*0.2, 0.10, 0.97); }

function doKill(){ if(!running) return; if(charges <= 0) return; charges--; if(charges < CONFIG.killMaxCharges && !nextChargeReadyAt) nextChargeReadyAt = performance.now() + CONFIG.killCooldownBetweenUses_s*1000; updateHUD(); for(let i=spirals.length-1;i>=0;i--){ const s = spirals[i]; const p = compute_p_hit(s); const res = s.killAttempt(p, rng); if(res === 'dead') totalKilled++; } removeDead(); updateHUD(); if(spirals.length === 0) gameOver(true); }
killBtn.addEventListener('click', ()=> doKill());
startBtn.addEventListener('click', ()=> startGame());

function ensureInstancedLOD(){
 if(Shared.instancedLOD) return;
 ensureSharedResources();
 const count = spirals.length;
 if(count === 0) return;
 const geom = Shared.lodGeom.clone();
 const mat = Shared.lodMat.clone();
 const inst = new THREE.InstancedMesh(geom, mat, count);
 const dummy = new THREE.Object3D();
 for(let i=0;i<count;i++){
   const s = spirals[i];
   dummy.position.copy(s.pos);
   dummy.updateMatrix();
   inst.setMatrixAt(i, dummy.matrix);
 }
 inst.instanceMatrix.needsUpdate = true;
 Shared.instancedLOD = inst;
 Shared.instancedCount = count;
 scene.add(inst);
 for(let i=0;i<spirals.length;i++){
   if(spirals[i].mesh){ scene.remove(spirals[i].mesh); spirals[i].mesh = null; }
 }
}
function updateInstancedLODMatrices(){
 if(!Shared.instancedLOD) return;
 const dummy = new THREE.Object3D();
 const limit = Math.min(Shared.instancedCount, spirals.length);
 for(let i=0;i<limit;i++){
   dummy.position.copy(spirals[i].pos);
   dummy.updateMatrix();
   Shared.instancedLOD.setMatrixAt(i, dummy.matrix);
 }
 Shared.instancedLOD.instanceMatrix.needsUpdate = true;
}

const perf = { samples: [], lastSampleTs: performance.now(), avgFrameMs: 0 };
function sampleFrame(ms){
 const now = performance.now();
 perf.samples.push(ms);
 while(perf.samples.length > 60) perf.samples.shift();
 if(now - perf.lastSampleTs > CONFIG.perfSamplingMs){
   const sum = perf.samples.reduce((a,b)=>a+b,0);
   perf.avgFrameMs = sum / perf.samples.length;
   perf.lastSampleTs = now;
   if(perf.avgFrameMs > CONFIG.autoThrottleFPSDropThreshold){
     currentRenderScale = Math.max(CONFIG.lowRenderScale, currentRenderScale - 0.05);
     applyRenderSize(currentRenderScale);
     if(!highPerfMode) CONFIG.minRenderIntervalMs = Math.min(1000/20, Math.max(CONFIG.minRenderIntervalMs, perf.avgFrameMs));
   } else {
     if(currentRenderScale < CONFIG.dynamicRenderScale){
       currentRenderScale = Math.min(CONFIG.dynamicRenderScale, currentRenderScale + 0.05);
       applyRenderSize(currentRenderScale);
     }
     CONFIG.minRenderIntervalMs = highPerfMode ? CONFIG.highPerfRenderIntervalMs : (1000/30);
   }
 }
}

let acc = 0;
const fixedDt = 16.6667;
let lastRenderTime = performance.now();
let lastActivityTime = performance.now();
CONFIG.minRenderIntervalMs = 1000/30;
let lastFrameTs = performance.now();

function tickLoop(now){
 requestAnimationFrame(tickLoop);
 now = now || performance.now();
 let dt = now - last;
 if(dt > 1000) dt = 1000;
 last = now;
 acc += dt;
 const perfNow = performance.now();
 for(let i=0;i<spirals.length;i++){ const s = spirals[i]; if(s.isAnimatingDivision) s.progressDivision(perfNow); }
 while(acc >= fixedDt){ step(fixedDt); acc -= fixedDt; }
 const smallScreenFactor = Math.min(1, Math.max(0.5, 420 / Math.max(1, container.clientHeight)));
 const adaptiveLODThreshold = Math.max(60, Math.floor(CONFIG.lodThreshold * smallScreenFactor));
 if(spirals.length > adaptiveLODThreshold && !Shared.instancedLOD){ ensureInstancedLOD(); lodMode = true; }
 else if(spirals.length <= adaptiveLODThreshold && Shared.instancedLOD){
   scene.remove(Shared.instancedLOD); Shared.instancedLOD.geometry.dispose(); Shared.instancedLOD.material.dispose(); Shared.instancedLOD = null; Shared.instancedCount = 0; for(let i=0;i<spirals.length;i++) spirals[i].restoreSpiralMesh(); lodMode = false;
 }
 const nowPerf = performance.now();
 for(let i=0;i<spirals.length;i++) spirals[i].update(dt, nowPerf, noise);
 removeDead();
 if(Shared.instancedLOD) updateInstancedLODMatrices();
 updateHUD();
 const sinceLastRender = perfNow - lastRenderTime;
 const needRender = running || (perfNow - lastActivityTime < 2000);
 const minInterval = highPerfMode ? CONFIG.highPerfRenderIntervalMs : CONFIG.minRenderIntervalMs;
 if(needRender && sinceLastRender >= minInterval){
   const t0 = performance.now();
   renderer.render(scene, camera);
   lastRenderTime = performance.now();
   const frameMs = lastRenderTime - t0;
   sampleFrame(frameMs);
   sampleFrame(performance.now() - lastFrameTs);
   lastFrameTs = performance.now();
 } else if(!needRender && sinceLastRender >= 250){
   renderer.render(scene, camera);
   lastRenderTime = perfNow;
 }
}

function step(dt){
 if(running){
   if(charges < CONFIG.killMaxCharges && nextChargeReadyAt){
     if(performance.now() >= nextChargeReadyAt){
       charges++;
       nextChargeReadyAt = performance.now() + CONFIG.killCooldownBetweenUses_s*1000;
       if(charges >= CONFIG.killMaxCharges){ charges = CONFIG.killMaxCharges; nextChargeReadyAt = null; }
     }
   }
   if(charges < CONFIG.killMaxCharges && nextChargeReadyAt){
     const sLeft = Math.ceil((nextChargeReadyAt - performance.now())/1000);
     recoveryEl.textContent = (LOCALES[ACTIVE_LOCALE].recovery || LOCALES['en'].recovery)(sLeft + 's');
   } else recoveryEl.textContent = (LOCALES[ACTIVE_LOCALE].recovery || LOCALES['en'].recovery)('—');
   if(spirals.length > CONFIG.maxSpirals) gameOver(false);
 }
}

/* Start game & loop */
startGame();
requestAnimationFrame(tickLoop);

/* Resize & activity handlers */
window.addEventListener('resize', ()=> { applyRenderSize(currentRenderScale); });
['mousemove','mousedown','keydown','touchstart'].forEach(ev => window.addEventListener(ev, ()=> { lastActivityTime = performance.now(); }, {passive:true}));

/* High perf toggle (double-click Start) */
startBtn.addEventListener('dblclick', ()=>{
 highPerfMode = !highPerfMode;
 CONFIG.minRenderIntervalMs = highPerfMode ? CONFIG.highPerfRenderIntervalMs : (1000/30);
 if(highPerfMode){ currentRenderScale = Math.min(1.0, CONFIG.dynamicRenderScale + 0.15); applyRenderSize(currentRenderScale); }
 else { currentRenderScale = CONFIG.dynamicRenderScale; applyRenderSize(currentRenderScale); }
 const banner = document.getElementById('banner');
 banner.textContent = highPerfMode ? 'High Perf: 60 FPS' : 'Balanced Perf: 30 FPS';
 banner.classList.add('show');
 setTimeout(()=> banner.classList.remove('show'), 1500);
});

/* PWA: register service worker and handle beforeinstallprompt */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{ /* ignore registration errors for local file usage */ });
}
let deferredPrompt = null;
let installBannerTimeout = null;

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('banner');
  banner.textContent = 'Tap to install game | ✖️';
  banner.classList.add('show');
  banner.style.cursor = 'pointer';
  
  // Обработчик клика по баннеру
  const handleInstall = async () => {
    if(installBannerTimeout) clearTimeout(installBannerTimeout);
    banner.classList.remove('show');
    banner.onclick = null;
    banner.ondblclick = null;
    if(deferredPrompt){
      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  };
  
  // Обработчик закрытия (клик на ✖️)
  const handleClose = (e) => {
    e.stopPropagation();
    if(installBannerTimeout) clearTimeout(installBannerTimeout);
    banner.classList.remove('show');
    banner.onclick = null;
    banner.ondblclick = null;
  };
  
  // Устанавливаем обработчики
  banner.onclick = (e) => {
    const rect = banner.getBoundingClientRect();
    const isClose = (e.clientX - rect.left) > (rect.width - 35);
    if(isClose){
      handleClose(e);
    } else {
      handleInstall();
    }
  };
  
  // Автоматическое скрытие через 5 секунд
  installBannerTimeout = setTimeout(() => {
    if(banner.classList.contains('show')){
      banner.classList.remove('show');
      banner.onclick = null;
      banner.ondblclick = null;
      installBannerTimeout = null;
    }
  }, 5000);
});

// Дополнительно: если пользователь уже установил игру, не показываем баннер при следующих запусках
if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true){
  console.log('App is already installed, skipping install prompt');
  // Убираем обработчик, чтобы не показывать баннер
  window.removeEventListener('beforeinstallprompt', ()=>{});
}

/* Locale apply */
function applyLocale(){ refreshUIText(); updateHUD(); }
applyLocale();

</script>
